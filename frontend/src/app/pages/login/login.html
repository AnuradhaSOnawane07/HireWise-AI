<div class="login-container">

  <div class="login-card">

    <h1>HireWise AI</h1>

    <p>Welcome Back 👋</p>

    <form>

      <div class="input-group">
        <label>Email</label>
        <input
          type="email"
          placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter your password">
      </div>

      <button type="submit">
        Login
      </button>

      <p class="register">
        Don't have an account?
        <a routerLink="/register">Register</a>
      </p>

    </form>

  </div>

</div>
