<div class="login-container">

  <div class="login-card">

    <h1>HireWise AI Test</h1>

    <p>Welcome Back 👋</p>

    <form>

  <input
    type="email"
    name="email"
    [(ngModel)]="email"
    placeholder="Email">

  <input
    type="password"
    name="password"
    [(ngModel)]="password"
    placeholder="Password">

  <button
    type="button"
    (click)="login()">
    Login
  </button>

</form>

  </div>

</div>
