<div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl hover:-translate-y-2 transition-all duration-300 cursor-pointer">

    <div class="flex justify-between items-center">

        <div>

            <p class="text-slate-500 text-sm">

                {{title}}

            </p>

            <h2 class="text-4xl font-bold mt-3">

                {{value}}

            </h2>

            <p class="text-slate-400 mt-2">

                {{subtitle}}

            </p>

        </div>

        <div
        class="w-16 h-16 rounded-2xl text-white flex items-center justify-center"
        [ngClass]="color">

            <span class="material-symbols-outlined text-4xl">

                {{icon}}

            </span>

        </div>

    </div>

</div>
