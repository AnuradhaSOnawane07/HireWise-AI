<header class="h-20 bg-[#0F172A] border-b border-slate-700 px-8 flex items-center justify-between">

    <!-- Left -->

    <div>

        <h1 class="text-3xl font-bold text-white">

            Dashboard

        </h1>

        <p class="text-slate-400">

            Welcome back 👋

        </p>

    </div>

    <!-- Right -->

    <div class="flex items-center gap-6">

        <!-- Search -->

        <div class="relative">

            <span
            class="material-symbols-outlined absolute left-3 top-3 text-slate-400">

                search

            </span>

            <input
            type="text"
            placeholder="Search..."

            class="w-72
            bg-slate-800
            border
            border-slate-700
            text-white
            rounded-xl
            pl-12
            pr-4
            py-3
            outline-none
            focus:ring-2
            focus:ring-blue-500">

        </div>

        <!-- Notification -->

        <button class="relative">

            <span class="material-symbols-outlined text-white">

                notifications

            </span>

            <span
            class="absolute
            -top-2
            -right-2
            bg-red-500
            text-white
            rounded-full
            text-xs
            w-5
            h-5
            flex
            items-center
            justify-center">

                {{notifications}}

            </span>

        </button>

        <!-- Dark Mode -->

        <button>

            <span
            class="material-symbols-outlined text-white">

                dark_mode

            </span>

        </button>

        <!-- Profile -->

        

            <div
class="relative"
(click)="stop($event)">

<div

class="flex items-center gap-4 cursor-pointer"

(click)="toggleMenu()">

<!-- Google Profile Image -->
<!-- Google Profile -->

<img

*ngIf="user?.profileImage"

[src]="user.profileImage"

class="w-12 h-12 rounded-full object-cover border-2 border-white shadow">

<!-- Initial Avatar -->

<div

*ngIf="!user?.profileImage"

class="avatar"

[style.background]="getAvatarColor()">

{{ getUserInitial() }}

</div>
<div>

<h3 class="font-semibold text-slate-300">

{{user?.fullName}}

</h3>

<p class="text-xs text-slate-400">

AI Career Explorer

</p>

</div>

<span
class="text-slate-500 text-sm">

▼

</span>

</div>

<div

*ngIf="showMenu"

class="absolute
right-0
top-16
w-64
bg-white
rounded-2xl
shadow-2xl
border
overflow-hidden">

<div class="px-5 py-4 border-b">

<h3 class="font-semibold">

{{user?.fullName}}

</h3>

<p class="text-xs text-slate-500 truncate">

{{user?.email}}

</p>

</div>

<button
class="menu-item">

👤 My Profile

</button>

<button
class="menu-item">

📄 My Resume

</button>

<button
class="menu-item">

📊 Dashboard

</button>

<button
class="menu-item">

🤖 Interview History

</button>

<button
class="menu-item">

⚙ Settings

</button>

<button
class="menu-item">

🌙 Dark Mode

</button>

<button

(click)="logout()"

class="menu-item text-red-600">

🚪 Logout

</button>

</div>

</div>

    </div>

</header>
