<header class="h-20 bg-[#0F172A] border-b border-slate-700 px-8 flex items-center justify-between">

    <!-- Left -->

    <div>

        <h1 class="text-3xl font-bold text-white">

            Dashboard

        </h1>

        <p class="text-slate-400">

            Welcome back 👋

        </p>

    </div>

    <!-- Right -->

    <div class="flex items-center gap-6">

        <!-- Search -->

        <div class="relative">

            <span
            class="material-symbols-outlined absolute left-3 top-3 text-slate-400">

                search

            </span>

            <input
            type="text"
            placeholder="Search..."

            class="w-72
            bg-slate-800
            border
            border-slate-700
            text-white
            rounded-xl
            pl-12
            pr-4
            py-3
            outline-none
            focus:ring-2
            focus:ring-blue-500">

        </div>

        <!-- Notification -->

        <button class="relative">

            <span class="material-symbols-outlined text-white">

                notifications

            </span>

            <span
            class="absolute
            -top-2
            -right-2
            bg-red-500
            text-white
            rounded-full
            text-xs
            w-5
            h-5
            flex
            items-center
            justify-center">

                {{notifications}}

            </span>

        </button>

        <!-- Dark Mode -->

        <button>

            <span
            class="material-symbols-outlined text-white">

                dark_mode

            </span>

        </button>

        <!-- Profile -->

        <div class="relative">

            <div

            (click)="toggleProfile()"

            class="flex
            items-center
            gap-3
            cursor-pointer">

                <img
                src="https://i.pravatar.cc/100"
                class="w-12 h-12 rounded-full border-2 border-blue-500">

                <div>

                    <h3 class="font-semibold text-white">

                        {{user.name}}

                    </h3>

                    <p class="text-sm text-slate-400">

                        {{user.role}}

                    </p>

                </div>

                <span class="material-symbols-outlined text-white">

                    expand_more

                </span>

            </div>

            <!-- Dropdown -->

            <div

            *ngIf="isProfileOpen"

            class="absolute
            right-0
            mt-4
            w-56
            bg-slate-800
            rounded-xl
            shadow-xl
            overflow-hidden">

                <a
                class="block px-5 py-4 text-white hover:bg-slate-700 cursor-pointer">

                    👤 My Profile

                </a>

                <a
                class="block px-5 py-4 text-white hover:bg-slate-700 cursor-pointer">

                    ⚙ Settings

                </a>

                <a

                (click)="logout()"

                class="block px-5 py-4 text-red-400 hover:bg-slate-700 cursor-pointer">

                    🚪 Logout

                </a>

            </div>

        </div>

    </div>

</header>
