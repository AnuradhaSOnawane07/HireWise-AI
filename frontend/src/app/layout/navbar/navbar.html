<header
class="h-20
bg-white
border-b
border-slate-200
sticky
top-0
z-50
px-8
flex
items-center
justify-between">

    <!-- Left -->

    <div>

        <h1 class="text-3xl font-bold text-slate-800">

            Dashboard

        </h1>

        <p class="text-slate-500">

            Welcome back 👋

        </p>

    </div>

    <!-- Right -->

    <div class="flex items-center gap-6">

        <!-- Search -->

        <div class="relative">

            <span
            class="material-symbols-outlined absolute left-3 top-3 text-slate-400">

                search

            </span>

            <input
            type="text"
            placeholder="Search..."
            class="w-72
            rounded-xl
            border
            border-slate-300
            pl-12
            pr-4
            py-3
            outline-none
            focus:ring-2
            focus:ring-blue-500">

        </div>

        <!-- Notification -->

        <div class="flex items-center gap-4">

    <button class="relative">

        🔔

        <span
        class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full text-xs px-2">

            {{notifications}}

        </span>

    </button>

    <button
class="bg-red-500 px-4 py-2 rounded-lg text-white"
(click)="logout()">

Logout

</button>

</div>

        <!-- Theme -->

        <button>

            <span
            class="material-symbols-outlined text-3xl text-slate-600">

                dark_mode

            </span>

        </button>

        <!-- User -->

        <div
        class="flex
        items-center
        gap-3
        cursor-pointer">

            <img
            src="https://i.pravatar.cc/100"
            class="w-12 h-12 rounded-full">

            <div>

                <h3 class="font-semibold">

                    Anuradha

                </h3>

                <p class="text-sm text-slate-500">

                    Student

                </p>

            </div>

            <span class="material-symbols-outlined">

                expand_more

            </span>
            

        </div>

    </div>

</header>
